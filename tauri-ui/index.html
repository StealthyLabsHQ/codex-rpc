<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex RPC Settings</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./main.js"></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="title-row">
          <h1>Codex RPC Settings</h1>
          <div class="theme-switch" aria-label="Theme">
            <button type="button" data-theme-option="dark">Dark</button>
            <button type="button" data-theme-option="system">System</button>
            <button type="button" data-theme-option="light">Light</button>
          </div>
        </div>
        <p id="status" class="status">Codex: Off</p>
      </header>

      <section class="panel">
        <div class="legend">Buttons</div>
        <div class="grid head">
          <span>Slot</span>
          <span>Label</span>
          <span>URL</span>
        </div>
        <div class="grid">
          <label>Button 1</label>
          <input id="label0" maxlength="32" spellcheck="false" />
          <input id="url0" spellcheck="false" />
        </div>
        <div class="grid">
          <label>Button 2</label>
          <input id="label1" maxlength="32" spellcheck="false" />
          <input id="url1" spellcheck="false" />
        </div>
      </section>

      <section class="panel mode-panel">
        <div class="legend">Mode</div>
        <label for="mode">RPC mode</label>
        <select id="mode">
          <option value="playing">Playing</option>
          <option value="watching">Watching (TV)</option>
          <option value="listening">Listening</option>
          <option value="competing">Competing</option>
        </select>
        <p id="hint">Buttons are sent only in Watching mode.</p>
      </section>

      <section class="panel presets">
        <div class="legend">Presets</div>
        <button type="button" data-preset="codex">Open Codex</button>
        <button type="button" data-preset="usage">Usage</button>
        <button type="button" data-preset="repo">GitHub repo</button>
      </section>

      <footer>
        <button type="button" id="clear" class="ghost">Clear</button>
        <span id="message"></span>
        <button type="button" id="apply">Apply</button>
        <button type="button" id="close" class="primary">Close</button>
      </footer>
    </main>
  </body>
</html>
