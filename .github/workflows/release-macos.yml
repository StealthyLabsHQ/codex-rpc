name: Release macOS

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and upload
        required: true
        default: v0.3.8

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app
        run: npm run tauri:build:macos

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          dmg="$(find src-tauri/target/release/bundle/dmg -name '*.dmg' -type f | head -n 1)"
          bin="$(find bin -name 'codex-rich-presence-macos-*' -type f | head -n 1)"
          gh release upload "$TAG" "$dmg" "$bin" --clobber
